<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PÁGINA DE LOGIN</title>
    <link rel="stylesheet" href="./css/main.css" />

    <script src="./js/cadastro.js" defer></script>

</head>

<body>
    <header class="cabecalho">
        <nav class="cabecalho__nav">
            <ul class="cabecalho__ul">
                <li class="cabecalho__li">
                    <a class="cabecalho__a" href="./index.html">Home</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="conteudo">
        <section class="hero">
            <div class="hero__container hero__container--login">
                <h1 class="hero__title">CADASTRO DE USUÁRIO</h1>
                <form action="/index.php" method="GET">
                    <legend class="cadastro__legend">Dados do Usuário</legend>

                    <fieldset class="cadastro__field">
                        <div class="cadastro__div">
                            <label class="cadastro__label" for="idEmail">Email:</label>
                            <input type="email" name="email" id="idEmail" placeholder="Digite seu email:" required
                                minlength="15" maxlength="150">
                        </div>
                        <div class="cadastro__div">
                            <label class="cadastro__label" for="idSenha">Senha:</label>
                            <input type="password" name="senha" id="idSenha" placeholder="Digite sua senha:" required
                                minlength="5" maxlength="20">

                            <button type="submit" class="btnCadastrar" id="btnCadastrar"><a href="./login.html">Cadastrar</a></button>
                        </div>
                    </fieldset>

                    <div class="cadastro__div">
                        <p>Já tem uma conta? <button class="btnFacaLogin"><a  href="./login.html">Faça login</a></button></p>
                    </div>
                    </fieldset>

                </form>
            </div>
        </section>
    </main>



    <footer>
        <p>&copy; 2026 ESPORTE TOTAL. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
