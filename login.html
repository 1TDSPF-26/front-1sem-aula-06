<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PÁGINA DE LOGIN</title>
    <link rel="stylesheet" href="./css/main.css" />
</head>

<body>
    <header class="cabecalho">
        <nav class="cabecalho__nav">
            <ul class="cabecalho__ul">
                <li class="cabecalho__li">
                    <a class="cabecalho__a" href="./index.html">Home</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="conteudo">
        <section class="hero">
            <div class="hero__container hero__container--login">
                <h1 class="hero__title">CONTROLE DE ACESSO</h1>
                <form action="/index.php" method="GET">
                    <fieldset>
                        <div>
                            <legend>Dados do Usuário</legend>
                            <label for="idEmail">Email</label>
                            <input type="email" name="email" id="idEmail" placeholder="Digite seu email:" required
                                minlength="15" maxlength="150">
                        </div>
                        <div>
                            <label for="idSenha">Senha</label>
                            <input type="password" name="senha" id="idSenha" placeholder="Digite sua senha:" required
                                minlength="5" maxlength="20">

                            <button type="submit">Login</button>
                        </div>
                    </fieldset>

                </form>
            </div>
        </section>
    </main>
    
    <script>
        alert("ola Mundo")
    </script>

    <footer>
        <p>&copy; 2026 ESPORTE TOTAL. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
